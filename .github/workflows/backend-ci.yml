name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: timewise_test
          POSTGRES_USER: timewise_user
          POSTGRES_PASSWORD: timewise_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Run migrations
        working-directory: backend
        env:
          POSTGRES_DB: timewise_test
          POSTGRES_USER: timewise_user
          POSTGRES_PASSWORD: timewise_pass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        run: uv run python manage.py migrate --no-input

      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_DB: timewise_test
          POSTGRES_USER: timewise_user
          POSTGRES_PASSWORD: timewise_pass
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production
        run: |
          uv run pytest \
            --cov=. \
            --cov-omit="*/.venv/*,*/tests/*,*/migrations/*,manage.py" \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
